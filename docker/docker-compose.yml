services:
  api-gateway:
    image: ${NEXUS_API_GATEWAY_IMAGE:-dreamyg/nexus-api-gateway:latest}
    pull_policy: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus}@postgres:5432/${POSTGRES_DB:-nexus}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NEXUS_INFRA_MODE: ${NEXUS_INFRA_MODE:-production}
      NEXUS_LOG_MODE: ${NEXUS_LOG_MODE:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NEXUS_TENANT_ID: ${NEXUS_TENANT_ID:-default}
      DEFAULT_TENANT_ID: ${NEXUS_TENANT_ID:-default}
      NEXUS_DEFAULT_MODEL: ${NEXUS_DEFAULT_MODEL:-local-phase1-mvp}
      NEXUS_MODEL: ${NEXUS_DEFAULT_MODEL:-local-phase1-mvp}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      NEXUS_INTENT_MODEL: ${NEXUS_INTENT_MODEL:-}
      NEXUS_INTENT_CONFIDENCE_THRESHOLD: ${NEXUS_INTENT_CONFIDENCE_THRESHOLD:-0.5}
      NEXUS_INTENT_CLARIFICATION_THRESHOLD: ${NEXUS_INTENT_CLARIFICATION_THRESHOLD:-0.2}
      NEXUS_INTENT_TIMEOUT_MS: ${NEXUS_INTENT_TIMEOUT_MS:-8000}
      NEXUS_INTENT_CACHE_TTL_SEC: ${NEXUS_INTENT_CACHE_TTL_SEC:-60}
      NEXUS_APPROVAL_POLICY: ${NEXUS_APPROVAL_POLICY:-auto}
      NEXUS_RATE_LIMIT_PER_USER: ${NEXUS_RATE_LIMIT_PER_USER:-120}
      NEXUS_HMAC_SECRET: ${NEXUS_HMAC_SECRET:-}
      FEISHU_ENCRYPT_KEY: ${FEISHU_ENCRYPT_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
    ports:
      - "${NEXUS_API_GATEWAY_HOST_PORT:-3200}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/ready', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 6

  console:
    image: ${NEXUS_API_GATEWAY_IMAGE:-dreamyg/nexus-api-gateway:latest}
    pull_policy: always
    env_file:
      - .env
    command: ["node", "apps/console/dist/server.js"]
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXUS_GATEWAY_URL: ${NEXUS_GATEWAY_URL:-http://localhost:3200}
    ports:
      - "${NEXUS_CONSOLE_HOST_PORT:-3201}:3001"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      start_period: 40s
      interval: 10s
      timeout: 5s
      retries: 6

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus}
      POSTGRES_DB: ${POSTGRES_DB:-nexus}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    profiles:
      - full

volumes:
  pgdata:
  qdrant_data:
